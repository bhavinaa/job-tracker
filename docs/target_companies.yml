# ============================================================
# Summary (post-resolve, 2026-04-23)
# ============================================================
# Total companies: 82
#
# ATS breakdown:
#   greenhouse:    8  (Carousell, Stripe, Aspire, Notion, Datadog, AfterShip + 2 existing)
#   lever:         7  (Nium, Figma, ADDX, ShopBack, Ninja Van, PatSnap + 1 existing)
#   ashby:         2  (Airwallex, Atlan)
#   workday:       4  (Grab, GXS Bank, Razer, Workday)       # Tier 3 — Playwright required; deferred v1.x
#   google:        1  (Google)
#   meta:          1  (Meta)
#   manual:       34  (banks, consulting, big-tech with custom portals, SG mid-stage without standard ATS)
#   cold-outreach:25  (seed/stealth SG startups with no public careers page — reach via DM / warm intro)
#   unknown:       0  (all resolved)
#
# Tier 1 coverage (v1 automates): 18 companies across greenhouse + lever + ashby + google + meta.
#   These companies will be POLLED automatically once v1 ships.
#
# Tier 2 (v1.x): workday (4 companies). Needs Playwright.
#
# Manual: 34 companies — user pastes URLs when a new role of interest appears. Still valuable; just more effort.
#
# Cold-outreach: 25 companies — these skip ATS polling entirely. User adds recipients
#   (name + role + email/linkedin) and the app drafts cold emails per the v0.3 design.
#
# Verification legend:
#   # verified: <ATS endpoint>   → confirmed via web search against the live careers page
#   (no comment)                 → defaulted from heuristic (banks / consulting / big-tech with custom portals → manual)
#                                  or from stage (SG seed-stage with no careers page → cold-outreach)
#
# Next time you sit down with this file:
#   1. Spot-check a few "manual" tags — some might actually be Greenhouse/Lever if you browse
#      the link and find it redirects (many company careers.com/jobs pages embed Greenhouse boards).
#   2. For "cold-outreach" entries, add recipient names from LinkedIn as you find them.
#   3. Phase 2: add NYC companies to a new bucket once internship hunt wraps.
