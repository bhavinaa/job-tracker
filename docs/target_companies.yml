# target_companies.yml
# Seed input for job discovery tool v1
# Generated: 2026-04-23 (Phase 1: SG-focused internship hunt. Phase 2: NYC, added later.)
#
# ATS types (v1 Tier 1 supported: greenhouse, lever, ashby, workday, google, meta, manual, cold-outreach):
#   greenhouse     → job-boards.greenhouse.io / boards-api.greenhouse.io (public API)
#   lever          → jobs.lever.co / api.lever.co (public API)
#   ashby          → jobs.ashbyhq.com (public API via GraphQL)
#   workday        → *.myworkdayjobs.com (Playwright required; deferred to v1.x)
#   workable       → apply.workable.com (v1.x; public API exists)
#   google         → careers.google.com (custom plugin)
#   meta           → metacareers.com (custom plugin)
#   manual         → custom careers site (user pastes URLs; LLM extracts)
#   cold-outreach  → no public listing / seed-stage / reach via DM
#   unknown        → still to be resolved (app skips these)
#
# Buckets:
#   big-tech       → Large MNCs with SG presence
#   finance        → Banks, hedge funds, trading firms
#   consulting     → MBB + Big 4
#   sg-tech        → SG-headquartered tech companies
#   sg-startup     → SG-based startups (Series A–D)
#   sg-fintech     → SG-based fintech startups
#   sg-crypto      → SG-based crypto/web3 companies
#   sg-ai          → SG-based AI startups
#   sg-enterprise  → SG-based enterprise/B2B SaaS
#   nyc-phase-2    → deferred; added after internship hunt

